<!DOCTYPE html>
<html lang="en" x-cloak x-data="app()" :lang="lang" :class="theme">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Evgeniy Gleba — C++ Systems Engineer. Cross-platform systems, game engines, reverse engineering.">
    <meta name="theme-color" :content="theme === 'dark' ? '#0f172a' : '#ffffff'">
    <meta name="author" content="Evgeniy Gleba">
    <meta property="og:title" content="Evgeniy Gleba — Systems Engineer">
    <meta property="og:description" content="Performance-first systems programming. C++23, game engines, reverse engineering.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://e-gleba.github.io">
    <title>evgeniy gleba — systems engineer</title>

    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' style='stop-color:%23FF6B9D'/%3E%3Cstop offset='50%25' style='stop-color:%23FF8C42'/%3E%3Cstop offset='100%25' style='stop-color:%23C792EA'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='64' height='64' rx='16' fill='%230f172a'/%3E%3Cpath d='M44 16 C28 14 14 22 14 32 C14 42 28 50 44 48 M14 32 L38 32 M44 16 C48 17 50 20 48 22' stroke='url(%23g)' stroke-width='4.5' stroke-linecap='round' stroke-linejoin='round' fill='none'/%3E%3Ccircle cx='48' cy='22' r='2.5' fill='%23FF6B9D' opacity='.8'/%3E%3C/svg%3E">
    <link rel="canonical" href="https://e-gleba.github.io">

    <link rel="preconnect" href="https://rsms.me" crossorigin>
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
    <link rel="preconnect" href="https://cdn.simpleicons.org" crossorigin>
    <link rel="stylesheet" href="https://rsms.me/inter/inter.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&family=JetBrains+Mono:wght@400;500;600&display=swap">

    <link href="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter var','Inter','-apple-system','BlinkMacSystemFont','sans-serif'],
                        mono: ['JetBrains Mono','SF Mono','Monaco','Inconsolata','monospace']
                    },
                    colors: {
                        accent: { DEFAULT:'#8B5CF6', light:'#A78BFA', dark:'#7C3AED' },
                        jb: { pink:'#FF6B9D', orange:'#FF8C42', purple:'#C792EA' }
                    },
                    fontSize: {
                        'hero': ['4.5rem', { lineHeight: '1.08', letterSpacing: '-0.02em' }],
                        'hero-lg': ['5.5rem', { lineHeight: '1.05', letterSpacing: '-0.025em' }]
                    }
                }
            }
        }
    </script>

    <script defer src="https://cdn.jsdelivr.net/npm/@alpinejs/persist@3.14.9/dist/cdn.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/@alpinejs/focus@3.14.9/dist/cdn.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.9/dist/cdn.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.js"></script>

    <style>
        [x-cloak] { display: none !important; }
        .no-js [x-cloak] { display: block !important; }
        @supports (font-variation-settings: normal) { html { font-family: 'Inter var', sans-serif; } }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html { scroll-behavior: smooth; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; font-size: 17px; }
        body { overflow-x: hidden; max-width: 100vw; }

        @media (min-width: 640px)  { html { font-size: 18px; } }
        @media (min-width: 1024px) { html { font-size: 19px; } }
        @media (min-width: 1280px) { html { font-size: 20px; } }

        .glass {
            background: rgba(255,255,255,.06);
            backdrop-filter: blur(10px) saturate(150%);
            border: 1px solid rgba(255,255,255,.1);
        }
        .dark .glass { background: rgba(18,18,18,.72); border-color: rgba(255,255,255,.05); }

        .liquid-glass {
            background: rgba(255,255,255,.08);
            backdrop-filter: blur(14px) saturate(160%);
            border: 1px solid rgba(255,255,255,.12);
            box-shadow: 0 8px 32px rgba(0,0,0,.1), inset 0 1px 0 rgba(255,255,255,.1);
        }
        .dark .liquid-glass {
            background: rgba(18,18,18,.8);
            border-color: rgba(255,255,255,.08);
            box-shadow: 0 8px 32px rgba(0,0,0,.3), inset 0 1px 0 rgba(255,255,255,.05);
        }

        .dropdown-panel {
            background: rgba(255,255,255,.95);
            backdrop-filter: blur(24px) saturate(180%);
            border: 1px solid rgba(255,107,157,.2);
            box-shadow: 0 16px 48px rgba(0,0,0,.12);
        }
        .dark .dropdown-panel {
            background: rgba(15,23,42,.95);
            border-color: rgba(255,107,157,.3);
            box-shadow: 0 16px 48px rgba(0,0,0,.5);
        }

        .theme-btn {
            background: rgba(255,255,255,.08);
            backdrop-filter: blur(16px) saturate(180%);
            border: 1px solid rgba(255,255,255,.12);
        }
        .dark .theme-btn { background: rgba(0,0,0,.3); border-color: rgba(255,255,255,.08); }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, rgba(255,107,157,.4), rgba(255,140,66,.4));
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(180deg, rgba(255,107,157,.7), rgba(255,140,66,.7));
        }
        ::selection { background: rgba(255,107,157,.3); color: inherit; }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            user-select: none;
        }

        @keyframes shimmer {
            0%   { background-position: -1000px 0; }
            100% { background-position:  1000px 0; }
        }
        .skeleton {
            background: linear-gradient(90deg, rgba(255,255,255,.05) 0%, rgba(255,255,255,.1) 50%, rgba(255,255,255,.05) 100%);
            background-size: 1000px 100%; animation: shimmer 2s infinite linear;
        }
        .dark .skeleton {
            background: linear-gradient(90deg, rgba(0,0,0,.1) 0%, rgba(255,255,255,.05) 50%, rgba(0,0,0,.1) 100%);
            background-size: 1000px 100%;
        }

        .repo-card { transition: all .3s cubic-bezier(.4,0,.2,1); }
        .repo-card:hover { transform: translateY(-4px); box-shadow: 0 20px 40px rgba(255,107,157,.12); }
        .repo-card:focus-within { outline: 2px solid #FF6B9D; outline-offset: 2px; }

        .tech-pill {
            display: inline-flex; align-items: center; gap: .375rem;
            padding: .4rem .9rem;
            background: rgba(255,255,255,.04);
            border: 1px solid rgba(255,255,255,.08);
            border-radius: 999px;
            font-size: .875rem;
            font-weight: 500;
            transition: all .25s ease;
        }
        .tech-pill:hover {
            background: linear-gradient(135deg, rgba(255,107,157,.15), rgba(255,140,66,.15));
            border-color: rgba(255,107,157,.4);
            transform: translateY(-1px);
        }

        .gradient-text {
            background: linear-gradient(135deg, #FF6B9D, #FF8C42, #C792EA);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stat-card { position: relative; overflow: hidden; }
        .stat-card::before {
            content: '';
            position: absolute; inset: 0;
            background: linear-gradient(135deg, rgba(255,107,157,.06), rgba(199,146,234,.06));
            opacity: 0; transition: opacity .3s;
        }
        .stat-card:hover::before { opacity: 1; }

        html.light .light-waves, html:not(.dark) .light-waves { display: block; }
        html.light .dark-waves,  html:not(.dark) .dark-waves  { display: none;  }
        html.dark  .light-waves { display: none;  }
        html.dark  .dark-waves  { display: block; }

        button:focus-visible, a:focus-visible { outline: 2px solid #FF6B9D; outline-offset: 2px; }

        .hot-badge {
            background: linear-gradient(135deg, #FF6B9D, #FF8C42);
            color: white; font-size: .625rem; font-weight: 700;
            text-transform: uppercase; letter-spacing: .08em;
            padding: .15rem .5rem; border-radius: 4px;
            display: inline-flex; align-items: center; gap: .2rem;
        }

        .rate-warn {
            color: #FF8C42;
            font-variation-settings: 'FILL' 0, 'wght' 500, 'GRAD' 0, 'opsz' 20;
        }

        .text-justify-body {
            text-align: justify;
            text-justify: inter-word;
            hyphens: auto;
            -webkit-hyphens: auto;
        }
        @media (max-width: 640px) { .text-justify-body { text-align: left; hyphens: none; -webkit-hyphens: none; } }

        @media (max-width: 767px) {
            [data-aos] {
                opacity: 1 !important;
                transform: none !important;
                transition: none !important;
            }
        }
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: .01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: .01ms !important;
            }
            .skeleton { animation: none !important; }
        }
        @media (max-width: 768px) { .repo-card:hover { transform: none; } }
    </style>
</head>

<body class="bg-white dark:bg-gray-900 text-gray-900 dark:text-gray-100 transition-colors duration-300">

    <!-- bg -->
    <div class="fixed inset-0 pointer-events-none overflow-hidden z-0 w-screen" aria-hidden="true">
        <div class="absolute inset-0 opacity-[0.04] dark:opacity-[0.06]"
             style="background-image: radial-gradient(rgba(255,107,157,.6) 1px, transparent 1px); background-size: 28px 28px;"></div>
        <svg class="absolute inset-0 w-full h-full" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <linearGradient id="wg1" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" style="stop-color:#FF6B9D;stop-opacity:.12"/>
                    <stop offset="50%" style="stop-color:#FF8C42;stop-opacity:.08"/>
                    <stop offset="100%" style="stop-color:#C792EA;stop-opacity:.06"/>
                </linearGradient>
                <linearGradient id="wgd1" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" style="stop-color:#FF6B9D;stop-opacity:.15"/>
                    <stop offset="50%" style="stop-color:#FF8C42;stop-opacity:.1"/>
                    <stop offset="100%" style="stop-color:#C792EA;stop-opacity:.08"/>
                </linearGradient>
            </defs>
            <g class="light-waves">
                <path fill="url(#wg1)" d="M0,100 Q250,50 500,100 T1000,100 Q1250,50 1500,100 T2000,100 L2000,0 L0,0 Z">
                    <animate attributeName="d" dur="25s" repeatCount="indefinite"
                        values="M0,100 Q250,50 500,100 T1000,100 Q1250,50 1500,100 T2000,100 L2000,0 L0,0 Z;
                                M0,100 Q250,150 500,100 T1000,100 Q1250,150 1500,100 T2000,100 L2000,0 L0,0 Z;
                                M0,100 Q250,50 500,100 T1000,100 Q1250,50 1500,100 T2000,100 L2000,0 L0,0 Z"/>
                </path>
            </g>
            <g class="dark-waves">
                <path fill="url(#wgd1)" d="M0,100 Q250,50 500,100 T1000,100 Q1250,50 1500,100 T2000,100 L2000,0 L0,0 Z">
                    <animate attributeName="d" dur="25s" repeatCount="indefinite"
                        values="M0,100 Q250,50 500,100 T1000,100 Q1250,50 1500,100 T2000,100 L2000,0 L0,0 Z;
                                M0,100 Q250,150 500,100 T1000,100 Q1250,150 1500,100 T2000,100 L2000,0 L0,0 Z;
                                M0,100 Q250,50 500,100 T1000,100 Q1250,50 1500,100 T2000,100 L2000,0 L0,0 Z"/>
                </path>
            </g>
        </svg>
    </div>

    <!-- NAV -->
    <nav class="sticky top-0 z-50 glass" role="navigation" aria-label="Main navigation">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <a href="#" class="font-mono font-semibold text-xl tracking-tight group" aria-label="Home">
                    <span class="text-jb-pink">e</span><span class="text-gray-400 dark:text-gray-500 group-hover:text-jb-orange transition-colors">-</span><span>gleba</span>
                </a>
                <div class="hidden md:flex items-center space-x-8">
                    <a href="#about"    class="text-sm font-medium hover:text-jb-pink transition-colors" x-text="t('nav.about')"></a>
                    <a href="#projects" class="text-sm font-medium hover:text-jb-pink transition-colors" x-text="t('nav.projects')"></a>
                    <a href="#skills"   class="text-sm font-medium hover:text-jb-pink transition-colors" x-text="t('nav.skills')"></a>
                    <a href="#contact"  class="text-sm font-medium hover:text-jb-pink transition-colors" x-text="t('nav.contact')"></a>
                    <div class="relative">
                        <button @click="langOpen = !langOpen" @keydown.escape.window="langOpen = false"
                                class="p-2 rounded-lg theme-btn hover:border-jb-pink/30 transition-all flex items-center gap-1.5"
                                :aria-expanded="langOpen" aria-label="Select language">
                            <span class="material-symbols-outlined text-lg" aria-hidden="true">translate</span>
                            <span class="text-xs font-mono font-semibold" x-text="lang.toUpperCase()"></span>
                        </button>
                        <div x-show="langOpen" x-transition.opacity.duration.150ms @click.outside="langOpen = false"
                             class="absolute right-0 mt-2 w-48 rounded-xl dropdown-panel py-1.5 z-[60]" role="menu" x-trap.noscroll="langOpen">
                            <template x-for="l in langs" :key="l.code">
                                <button @click="lang = l.code; langOpen = false"
                                        class="w-full px-4 py-2.5 text-left hover:bg-jb-pink/10 transition-colors flex items-center gap-3 text-sm font-medium text-gray-700 dark:text-gray-200"
                                        :class="lang === l.code ? 'text-jb-pink dark:text-jb-pink' : ''" role="menuitem">
                                    <span class="text-base" aria-hidden="true" x-text="l.flag"></span>
                                    <span x-text="l.label"></span>
                                    <span class="material-symbols-outlined text-jb-pink text-sm ml-auto" x-show="lang === l.code" aria-hidden="true">check</span>
                                </button>
                            </template>
                        </div>
                    </div>
                    <button @click="toggleTheme()" class="p-2 rounded-lg theme-btn hover:border-jb-pink/30 transition-all"
                            :aria-label="theme === 'dark' ? 'Switch to light mode' : 'Switch to dark mode'">
                        <span class="material-symbols-outlined text-lg" x-text="theme === 'dark' ? 'light_mode' : 'dark_mode'" aria-hidden="true"></span>
                    </button>
                </div>
                <div class="md:hidden flex items-center gap-1.5">
                    <button @click="mobileMenu = !mobileMenu" class="p-2 rounded-lg theme-btn relative z-[60]" :aria-expanded="mobileMenu" aria-label="Menu">
                        <span class="material-symbols-outlined text-lg" x-text="mobileMenu ? 'close' : 'menu'" aria-hidden="true"></span>
                    </button>
                    <button @click="toggleTheme()" class="p-2 rounded-lg theme-btn" :aria-label="theme === 'dark' ? 'Light' : 'Dark'">
                        <span class="material-symbols-outlined text-lg" x-text="theme === 'dark' ? 'light_mode' : 'dark_mode'" aria-hidden="true"></span>
                    </button>
                </div>
            </div>
        </div>
        <!-- mobile menu panel (outside flex, inside nav) -->
        <div x-show="mobileMenu"
             x-transition:enter="transition ease-out duration-200"
             x-transition:enter-start="opacity-0"
             x-transition:enter-end="opacity-100"
             x-transition:leave="transition ease-in duration-150"
             x-transition:leave-start="opacity-100"
             x-transition:leave-end="opacity-0"
             @click.outside="mobileMenu = false"
             @keydown.escape.window="mobileMenu = false"
             class="md:hidden border-t border-white/10 dark:border-white/5">
            <div class="px-4 sm:px-6 py-4 space-y-1">
                <a href="#about"    @click="mobileMenu=false" class="block px-3 py-2.5 rounded-lg text-base font-medium hover:text-jb-pink hover:bg-jb-pink/5 transition-colors" x-text="t('nav.about')"></a>
                <a href="#projects" @click="mobileMenu=false" class="block px-3 py-2.5 rounded-lg text-base font-medium hover:text-jb-pink hover:bg-jb-pink/5 transition-colors" x-text="t('nav.projects')"></a>
                <a href="#skills"   @click="mobileMenu=false" class="block px-3 py-2.5 rounded-lg text-base font-medium hover:text-jb-pink hover:bg-jb-pink/5 transition-colors" x-text="t('nav.skills')"></a>
                <a href="#contact"  @click="mobileMenu=false" class="block px-3 py-2.5 rounded-lg text-base font-medium hover:text-jb-pink hover:bg-jb-pink/5 transition-colors" x-text="t('nav.contact')"></a>
                <div class="pt-3 mt-2 border-t border-white/10 dark:border-white/5 flex items-center gap-2">
                    <template x-for="l in langs" :key="l.code">
                        <button @click="lang = l.code; mobileMenu = false"
                                class="px-3 py-1.5 rounded-lg text-xs font-mono font-semibold transition-all"
                                :class="lang === l.code ? 'bg-jb-pink/20 text-jb-pink border border-jb-pink/30' : 'theme-btn'">
                            <span x-text="l.code.toUpperCase()"></span>
                        </button>
                    </template>
                </div>
            </div>
        </div>
    </nav>

    <!-- HERO (centered) -->

        <div class="max-w-4xl mx-auto w-full text-center">
            <div data-aos="fade-up">
<h1 class="text-4xl sm:text-5xl md:text-hero lg:text-hero-lg font-bold tracking-tight mb-3">

                </h1>

                    <div class="text-2xl sm:text-3xl lg:text-4xl font-bold gradient-text mb-1">3+</div>
                    <div class="text-sm text-gray-500 dark:text-gray-400 font-medium" x-text="t('stats.years')"></div>
                </div>
                <div class="stat-card glass rounded-xl p-5 text-center">
                    <div class="text-2xl sm:text-3xl lg:text-4xl font-bold gradient-text mb-1">C++23</div>
                    <div class="text-sm text-gray-500 dark:text-gray-400 font-medium" x-text="t('stats.standard')"></div>
                </div>
                <div class="stat-card glass rounded-xl p-5 text-center">
                    <div class="text-2xl sm:text-3xl lg:text-4xl font-bold gradient-text mb-1">25+</div>
                    <div class="text-sm text-gray-500 dark:text-gray-400 font-medium" x-text="t('stats.repos')"></div>
                </div>
                <div class="stat-card glass rounded-xl p-5 text-center">
                    <div class="text-2xl sm:text-3xl lg:text-4xl font-bold gradient-text mb-1">5</div>
                    <div class="text-sm text-gray-500 dark:text-gray-400 font-medium" x-text="t('stats.platforms')"></div>

    <!-- ABOUT -->
    <section id="about" class="relative py-16 sm:py-24 px-4 sm:px-6 lg:px-8">

            t(key) { return key.split('.').reduce((o,k) => o?.[k], this.translations[this.lang]) ?? key; },

            toggleTheme() {
                this.langOpen = false;
                this.mobileMenu = false;
                this.theme = this.theme === 'dark' ? 'light' : 'dark';
            },

            /**
             * Score repos by significance: stars, forks, originality, freshness.
             * Returns true for genuinely notable projects — not just forks or empty repos.
             */
            isHot(repo) {
                if (repo.fork) return false;
                if (repo.archived) return false;
                if (!repo.description) return false;

                let score = 0;
                score += repo.stargazers_count * 3;
                score += repo.forks_count * 4;

                const daysSincePush = (Date.now() - new Date(repo.pushed_at).getTime()) / 86400000;
                if (daysSincePush < 60) score += 3;
                else if (daysSincePush < 180) score += 1;

                if (repo.language) score += 1;

                return score >= 10;
            },

            async fetchGitHubData() {
                const ctrl = new AbortController();
                const tid = setTimeout(() => ctrl.abort(), 5000);
                try {
                    const res = await fetch('https://api.github.com/users/e-gleba/repos?sort=stars&direction=desc&per_page=30', {
                        headers: { Accept:'application/vnd.github.v3+json' }, signal: ctrl.signal
                    });
                    clearTimeout(tid);
                    if (res.status === 403 || res.status === 429) {
                        this.rateLimited = true;
                        this.repos = [];
                    } else if (res.ok) {
                        const data = await res.json();
                        if (!Array.isArray(data)) { this.repos = []; return; }
                        // filter out forks, sort by weighted score
                        this.repos = data
                            .filter(r => !r.fork)
                            .sort((a, b) => {
                                const sa = a.stargazers_count * 3 + a.forks_count * 4;
                                const sb = b.stargazers_count * 3 + b.forks_count * 4;
                                return sb - sa;
                            })
                            .slice(0, 6);
                        const rl = res.headers.get('x-ratelimit-remaining');
                        if (rl !== null && parseInt(rl, 10) <= 5) this.rateLimited = true;
                    } else {
                        this.repos = [];
                    }
                } catch(e) {
                    console.warn('github api unavailable:', e.message);
                    this.repos = [];
                } finally {
                    clearTimeout(tid);
                    this.loading = false;
                }
            },

            init() {
                this.fetchGitHubData();
                window.addEventListener('scroll', () => { this.showTop = window.scrollY > 400; }, { passive: true });
                this.$nextTick(() => {
                    const initAOS = () => {
                        if (typeof AOS !== 'undefined') {
                            AOS.init({ duration: 400, once: true, offset: 30, disable: 'mobile' });
                        }
                    };
                    if (document.readyState === 'complete') initAOS();
                    else window.addEventListener('load', initAOS);
                    // safety: if AOS never loads, reveal all elements after 2s
                    setTimeout(() => {
                        document.querySelectorAll('[data-aos]').forEach(el => {
                            el.style.opacity = '1';
                            el.style.transform = 'none';
                            el.style.transition = 'none';
                        });
                    }, 2500);
                });
                document.addEventListener('click', (e) => {
                    const a = e.target.closest('a[href^="#"]');
                    if (!a) return;
                    const target = document.querySelector(a.getAttribute('href'));
                    if (target) {
                        e.preventDefault();
                        target.scrollIntoView({ behavior:'smooth', block:'start' });
                    }
                });
            }
        };
    }
