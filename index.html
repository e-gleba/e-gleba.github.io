<!DOCTYPE html>
<html lang="en" x-cloak x-data="app()" :lang="lang" :class="theme">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="C++ Developer — Cross-platform systems, game development, reverse engineering">
    <meta name="theme-color" :content="theme === 'dark' ? '#0f172a' : '#ffffff'">
    <title>Evgeniy Gleba — C++ Systems Developer</title>

    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' style='stop-color:%23FF6B9D'/%3E%3Cstop offset='50%25' style='stop-color:%23FF8C42'/%3E%3Cstop offset='100%25' style='stop-color:%23C792EA'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='64' height='64' rx='12' fill='%23000000'/%3E%3Ctext x='32' y='45' font-family='monospace' font-size='36' font-weight='bold' text-anchor='middle' fill='url(%23g)'%3EE%3C/text%3E%3C/svg%3E">

    <!-- fonts -->
    <link rel="preconnect" href="https://rsms.me" crossorigin>
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
    <link rel="preconnect" href="https://cdn.simpleicons.org" crossorigin>
    <link rel="stylesheet" href="https://rsms.me/inter/inter.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200">

    <!-- pinned deps -->
    <link href="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter var', 'Inter', '-apple-system', 'BlinkMacSystemFont', 'sans-serif'],
                        mono: ['SF Mono', 'Monaco', 'Inconsolata', 'Courier New', 'monospace']
                    },
                    colors: {
                        accent: { DEFAULT: '#8B5CF6', light: '#A78BFA', dark: '#7C3AED' },
                        jb: { pink: '#FF6B9D', orange: '#FF8C42', purple: '#C792EA' }
                    }
                }
            }
        }
    </script>

    <!-- alpine: persist -> focus -> core  (order matters, all pinned) -->
    <script defer src="https://cdn.jsdelivr.net/npm/@alpinejs/persist@3.14.9/dist/cdn.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/@alpinejs/focus@3.14.9/dist/cdn.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.9/dist/cdn.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.js"></script>

    <style>
        /* --- base --- */
        [x-cloak] { display: none !important; }

        @supports (font-variation-settings: normal) {
            html { font-family: 'Inter var', sans-serif; }
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html {
            scroll-behavior: smooth;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body { overflow-x: hidden; }

        /* --- glass layers --- */
        .glass {
            background: rgba(255,255,255,.06);
            backdrop-filter: blur(10px) saturate(150%);
            border: 1px solid rgba(255,255,255,.1);
        }
        .dark .glass {
            background: rgba(18,18,18,.72);
            border-color: rgba(255,255,255,.05);
        }

        .liquid-glass {
            background: rgba(255,255,255,.08);
            backdrop-filter: blur(14px) saturate(160%);
            border: 1px solid rgba(255,255,255,.12);
            box-shadow: 0 8px 32px rgba(0,0,0,.1), inset 0 1px 0 rgba(255,255,255,.1);
        }
        .dark .liquid-glass {
            background: rgba(18,18,18,.8);
            border-color: rgba(255,255,255,.08);
            box-shadow: 0 8px 32px rgba(0,0,0,.3), inset 0 1px 0 rgba(255,255,255,.05);
        }

        /* --- dropdown (theme-aware via tailwind, no duplication) --- */
        .dropdown-panel {
            background: rgba(255,255,255,.95);
            backdrop-filter: blur(24px) saturate(180%);
            border: 1px solid rgba(255,107,157,.2);
            box-shadow: 0 16px 48px rgba(0,0,0,.12);
        }
        .dark .dropdown-panel {
            background: rgba(15,23,42,.95);
            border-color: rgba(255,107,157,.3);
            box-shadow: 0 16px 48px rgba(0,0,0,.5);
        }

        .theme-btn {
            background: rgba(255,255,255,.08);
            backdrop-filter: blur(16px) saturate(180%);
            border: 1px solid rgba(255,255,255,.12);
        }
        .dark .theme-btn {
            background: rgba(0,0,0,.3);
            border-color: rgba(255,255,255,.08);
        }

        /* --- scrollbar --- */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, rgba(255,107,157,.5), rgba(255,140,66,.5));
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(180deg, rgba(255,107,157,.7), rgba(255,140,66,.7));
        }
        ::selection { background: rgba(255,107,157,.3); color: inherit; }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            user-select: none;
        }

        /* --- animations --- */
        @keyframes shimmer {
            0%   { background-position: -1000px 0; }
            100% { background-position:  1000px 0; }
        }

        .skeleton {
            background: linear-gradient(90deg, rgba(255,255,255,.05) 0%, rgba(255,255,255,.1) 50%, rgba(255,255,255,.05) 100%);
            background-size: 1000px 100%;
            animation: shimmer 2s infinite linear;
        }
        .dark .skeleton {
            background: linear-gradient(90deg, rgba(0,0,0,.1) 0%, rgba(255,255,255,.05) 50%, rgba(0,0,0,.1) 100%);
            background-size: 1000px 100%;
        }

        .repo-card { transition: all .3s cubic-bezier(.4,0,.2,1); }
        .repo-card:hover { transform: translateY(-4px); box-shadow: 0 20px 40px rgba(255,107,157,.15); }
        .repo-card:focus-within { outline: 2px solid #FF6B9D; outline-offset: 2px; }

        .tech-badge-icon {
            display: inline-flex; align-items: center; gap: .5rem;
            padding: .5rem 1rem;
            background: linear-gradient(135deg, rgba(255,107,157,.1), rgba(255,140,66,.1));
            border: 1px solid rgba(255,107,157,.3);
            border-radius: 999px;
            transition: all .3s ease;
            font-size: .875rem;
        }
        .tech-badge-icon:hover {
            background: linear-gradient(135deg, rgba(255,107,157,.2), rgba(255,140,66,.2));
            border-color: rgba(255,107,157,.5);
            transform: translateY(-2px);
        }

        .gradient-text {
            background: linear-gradient(135deg, #FF6B9D, #FF8C42);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* wave visibility via class on <html> */
        html.light .light-waves, html:not(.dark) .light-waves { display: block; }
        html.light .dark-waves,  html:not(.dark) .dark-waves  { display: none;  }
        html.dark  .light-waves { display: none;  }
        html.dark  .dark-waves  { display: block; }

        button:focus-visible, a:focus-visible { outline: 2px solid #FF6B9D; outline-offset: 2px; }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: .01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: .01ms !important;
            }
            .skeleton { animation: none !important; }
        }
        @media (max-width: 768px) {
            .repo-card:hover { transform: none; }
        }
    </style>
</head>

<!--
  BUG FIX: all UI state (langOpen, mobileMenu, theme, lang) lives in ONE
  Alpine component on <body>. Previously nested x-data scopes caused the
  theme toggle to reference `open` from the lang-dropdown scope — when the
  class on <html> changed, Alpine re-evaluated and spawned a duplicate dropdown.
  Now every boolean is independent and accessed from the same root scope.
-->
<body class="bg-white dark:bg-gray-900 text-gray-900 dark:text-gray-100 transition-colors duration-300">

    <!-- background blobs -->
    <div class="fixed inset-0 pointer-events-none overflow-hidden z-0" aria-hidden="true">
        <div class="absolute inset-0 opacity-30 dark:opacity-20"
             style="background-image:
                repeating-linear-gradient(45deg,transparent,transparent 40px,rgba(255,107,157,.08) 40px,rgba(255,107,157,.08) 42px),
                repeating-linear-gradient(-45deg,transparent,transparent 40px,rgba(255,140,66,.08) 40px,rgba(255,140,66,.08) 42px);">
        </div>
        <svg class="absolute inset-0 w-full h-full" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <linearGradient id="wg1" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%"   style="stop-color:#FF6B9D;stop-opacity:.15"/>
                    <stop offset="50%"  style="stop-color:#FF8C42;stop-opacity:.12"/>
                    <stop offset="100%" style="stop-color:#C792EA;stop-opacity:.1"/>
                </linearGradient>
                <linearGradient id="wgd1" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%"   style="stop-color:#FF6B9D;stop-opacity:.18"/>
                    <stop offset="50%"  style="stop-color:#FF8C42;stop-opacity:.15"/>
                    <stop offset="100%" style="stop-color:#C792EA;stop-opacity:.12"/>
                </linearGradient>
            </defs>
            <g class="light-waves">
                <path fill="url(#wg1)" d="M0,100 Q250,50 500,100 T1000,100 Q1250,50 1500,100 T2000,100 L2000,0 L0,0 Z">
                    <animate attributeName="d" dur="20s" repeatCount="indefinite"
                        values="M0,100 Q250,50 500,100 T1000,100 Q1250,50 1500,100 T2000,100 L2000,0 L0,0 Z;
                                M0,100 Q250,150 500,100 T1000,100 Q1250,150 1500,100 T2000,100 L2000,0 L0,0 Z;
                                M0,100 Q250,50 500,100 T1000,100 Q1250,50 1500,100 T2000,100 L2000,0 L0,0 Z"/>
                </path>
            </g>
            <g class="dark-waves">
                <path fill="url(#wgd1)" d="M0,100 Q250,50 500,100 T1000,100 Q1250,50 1500,100 T2000,100 L2000,0 L0,0 Z">
                    <animate attributeName="d" dur="20s" repeatCount="indefinite"
                        values="M0,100 Q250,50 500,100 T1000,100 Q1250,50 1500,100 T2000,100 L2000,0 L0,0 Z;
                                M0,100 Q250,150 500,100 T1000,100 Q1250,150 1500,100 T2000,100 L2000,0 L0,0 Z;
                                M0,100 Q250,50 500,100 T1000,100 Q1250,50 1500,100 T2000,100 L2000,0 L0,0 Z"/>
                </path>
            </g>
        </svg>
    </div>

    <!-- ===== NAV ===== -->
    <nav class="sticky top-0 z-50 glass" role="navigation" aria-label="Main navigation">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <a href="#" class="font-bold text-lg tracking-tight" aria-label="Home">e-gleba</a>

                <!-- desktop nav -->
                <div class="hidden md:flex items-center space-x-8">
                    <a href="#about"    class="hover:text-accent transition-colors" x-text="t('nav.about')"></a>
                    <a href="#projects" class="hover:text-accent transition-colors" x-text="t('nav.projects')"></a>
                    <a href="#skills"   class="hover:text-accent transition-colors" x-text="t('nav.skills')"></a>
                    <a href="#contact"  class="hover:text-accent transition-colors" x-text="t('nav.contact')"></a>

                    <!-- lang picker (desktop) -->
                    <div class="relative">
                        <button @click="langOpen = !langOpen"
                                @keydown.escape.window="langOpen = false"
                                class="p-2 rounded-lg theme-btn hover:border-accent/50 transition-all flex items-center gap-2"
                                aria-label="Select language"
                                :aria-expanded="langOpen">
                            <span class="material-symbols-outlined text-xl" aria-hidden="true">language</span>
                            <span class="text-sm font-semibold" x-text="lang.toUpperCase()"></span>
                        </button>

                        <div x-show="langOpen"
                             x-transition.opacity.duration.150ms
                             @click.outside="langOpen = false"
                             class="absolute right-0 mt-2 w-52 rounded-xl dropdown-panel py-2 z-50"
                             role="menu"
                             x-trap.noscroll="langOpen">
                            <template x-for="l in langs" :key="l.code">
                                <button @click="lang = l.code; langOpen = false"
                                        class="w-full px-5 py-3 text-left hover:bg-accent/15 transition-colors flex items-center gap-3 font-medium text-gray-800 dark:text-gray-100"
                                        role="menuitem">
                                    <span class="text-xl" aria-hidden="true" x-text="l.flag"></span>
                                    <span x-text="l.label"></span>
                                </button>
                            </template>
                        </div>
                    </div>

                    <!-- theme toggle (desktop) — independent, no cross-scope refs -->
                    <button @click="toggleTheme()"
                            class="p-2 rounded-lg theme-btn hover:border-accent/50 transition-all flex items-center gap-2"
                            :aria-label="theme === 'dark' ? 'Switch to light mode' : 'Switch to dark mode'">
                        <span class="material-symbols-outlined text-xl" x-show="theme === 'dark'" aria-hidden="true">dark_mode</span>
                        <span class="material-symbols-outlined text-xl" x-show="theme === 'light'" aria-hidden="true">light_mode</span>
                    </button>
                </div>

                <!-- mobile controls -->
                <div class="md:hidden flex items-center gap-2">
                    <button @click="mobileMenu = !mobileMenu"
                            class="p-2 rounded-lg theme-btn hover:border-accent/50 transition-all"
                            aria-label="Toggle mobile menu"
                            :aria-expanded="mobileMenu">
                        <span class="material-symbols-outlined text-xl" aria-hidden="true"
                              x-text="mobileMenu ? 'close' : 'menu'"></span>
                    </button>

                    <button @click="toggleTheme()"
                            class="p-2 rounded-lg theme-btn hover:border-accent/50 transition-all"
                            :aria-label="theme === 'dark' ? 'Switch to light mode' : 'Switch to dark mode'">
                        <span class="material-symbols-outlined text-xl" x-show="theme === 'dark'" aria-hidden="true">dark_mode</span>
                        <span class="material-symbols-outlined text-xl" x-show="theme === 'light'" aria-hidden="true">light_mode</span>
                    </button>

                    <!-- mobile slide-down -->
                    <div x-show="mobileMenu"
                         x-transition:enter="transition ease-out duration-200"
                         x-transition:enter-start="opacity-0 -translate-y-2"
                         x-transition:enter-end="opacity-100 translate-y-0"
                         x-transition:leave="transition ease-in duration-150"
                         x-transition:leave-start="opacity-100 translate-y-0"
                         x-transition:leave-end="opacity-0 -translate-y-2"
                         @click.outside="mobileMenu = false"
                         @keydown.escape.window="mobileMenu = false"
                         class="absolute top-16 left-0 right-0 liquid-glass p-4 space-y-4 md:hidden"
                         x-trap.noscroll="mobileMenu">
                        <a href="#about"    @click="mobileMenu = false" class="block py-2 hover:text-accent transition-colors" x-text="t('nav.about')"></a>
                        <a href="#projects" @click="mobileMenu = false" class="block py-2 hover:text-accent transition-colors" x-text="t('nav.projects')"></a>
                        <a href="#skills"   @click="mobileMenu = false" class="block py-2 hover:text-accent transition-colors" x-text="t('nav.skills')"></a>
                        <a href="#contact"  @click="mobileMenu = false" class="block py-2 hover:text-accent transition-colors" x-text="t('nav.contact')"></a>

                        <div class="pt-4 border-t border-white/10 space-y-2">
                            <template x-for="l in langs" :key="l.code">
                                <button @click="lang = l.code; mobileMenu = false"
                                        class="w-full py-2 text-left flex items-center gap-2">
                                    <span aria-hidden="true" x-text="l.flag"></span>
                                    <span x-text="l.label"></span>
                                </button>
                            </template>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- ===== HERO ===== -->
    <section class="relative min-h-screen flex items-center justify-center px-4 sm:px-6 lg:px-8" role="banner">
        <div class="max-w-4xl mx-auto text-center" data-aos="fade-up">
            <div class="inline-flex items-center gap-2 px-4 py-2 rounded-full glass text-sm font-mono mb-8">
                <span class="text-jb-pink" aria-hidden="true">➜</span>
                <span class="text-gray-600 dark:text-gray-400">~/src</span>
                <span class="text-jb-pink" aria-hidden="true">git:(main)</span>
            </div>

            <h1 class="text-5xl sm:text-6xl lg:text-7xl font-bold tracking-tight mb-6">
                Evgeniy <span class="gradient-text">Gleba</span>
            </h1>

            <p class="text-xl sm:text-2xl text-gray-600 dark:text-gray-400 mb-8 font-mono">
                <span class="text-jb-pink" aria-hidden="true">$</span> whoami
                <span class="text-jb-orange" aria-hidden="true">→</span>
                <span x-text="t('hero.tagline')"></span>
            </p>

            <div class="flex flex-wrap justify-center gap-3 mb-12">
                <span class="tech-badge-icon">
                    <img src="https://cdn.simpleicons.org/cplusplus/FF6B9D" class="w-4 h-4" alt="" loading="lazy" width="16" height="16"> C++20/23
                </span>
                <span class="tech-badge-icon">
                    <img src="https://cdn.simpleicons.org/cmake/FF8C42" class="w-4 h-4" alt="" loading="lazy" width="16" height="16"> CMake
                </span>
                <span class="tech-badge-icon">
                    <img src="https://cdn.simpleicons.org/linux/C792EA" class="w-4 h-4" alt="" loading="lazy" width="16" height="16"> Linux
                </span>
                <span class="tech-badge-icon">
                    <img src="https://cdn.simpleicons.org/opengl/FF6B9D" class="w-4 h-4" alt="" loading="lazy" width="16" height="16"> OpenGL
                </span>
                <span class="tech-badge-icon">
                    <img src="https://cdn.simpleicons.org/android/FF8C42" class="w-4 h-4" alt="" loading="lazy" width="16" height="16"> Android NDK
                </span>
                <span class="tech-badge-icon">
                    <img src="https://cdn.simpleicons.org/apple/C792EA" class="w-4 h-4" alt="" loading="lazy" width="16" height="16"> iOS
                </span>
            </div>

            <div class="flex flex-col sm:flex-row items-center justify-center gap-4 mb-16">
                <a href="#projects"
                   class="group inline-flex items-center gap-2 px-8 py-4 bg-gradient-to-r from-accent to-accent-light rounded-lg font-semibold text-white shadow-lg hover:shadow-xl transform hover:-translate-y-0.5 transition-all duration-300">
                    <span x-text="t('hero.viewProjects')"></span>
                    <span class="material-symbols-outlined text-xl group-hover:translate-x-1 transition-transform" aria-hidden="true">arrow_forward</span>
                </a>
                <a href="#contact"
                   class="inline-flex items-center gap-2 px-8 py-4 glass rounded-lg font-semibold hover:border-accent/50 transition-all duration-300">
                    <span class="material-symbols-outlined text-xl" aria-hidden="true">mail</span>
                    <span x-text="lang === 'ru' ? 'Связаться' : lang === 'zh' ? '联系我' : 'Get in Touch'"></span>
                </a>
            </div>

            <div class="grid grid-cols-2 md:grid-cols-3 gap-6 text-center">
                <div class="p-4 glass rounded-xl" data-aos="fade-up" data-aos-delay="100">
                    <div class="text-3xl font-bold gradient-text mb-2">2+</div>
                    <div class="text-sm text-gray-600 dark:text-gray-400"
                         x-text="lang === 'ru' ? 'Лет опыта' : lang === 'zh' ? '年经验' : 'Years Exp.'"></div>
                </div>
                <div class="p-4 glass rounded-xl" data-aos="fade-up" data-aos-delay="200">
                    <div class="text-3xl font-bold gradient-text mb-2">C++20</div>
                    <div class="text-sm text-gray-600 dark:text-gray-400"
                         x-text="lang === 'ru' ? 'Стандарт' : lang === 'zh' ? '标准' : 'Standard'"></div>
                </div>
                <div class="p-4 glass rounded-xl" data-aos="fade-up" data-aos-delay="300">
                    <div class="text-3xl font-bold gradient-text mb-2">5</div>
                    <div class="text-sm text-gray-600 dark:text-gray-400"
                         x-text="lang === 'ru' ? 'Платформы' : lang === 'zh' ? '个平台' : 'Platforms'"></div>
                </div>
            </div>
        </div>
    </section>

    <!-- ===== ABOUT ===== -->
    <section id="about" class="relative py-20 px-4 sm:px-6 lg:px-8">
        <div class="max-w-4xl mx-auto">
            <h2 class="text-4xl font-bold mb-8 flex items-center gap-3" data-aos="fade-right">
                <span class="text-jb-pink" aria-hidden="true">//</span>
                <span x-text="t('about.title')"></span>
            </h2>
            <div class="space-y-6 text-lg text-gray-600 dark:text-gray-400 text-justify" data-aos="fade-up" data-aos-delay="100">
                <p x-text="t('about.p1')"></p>
                <p x-text="t('about.p2')"></p>
                <p x-text="t('about.p3')"></p>
                <p x-text="t('about.p4')"></p>
            </div>
        </div>
    </section>

    <!-- ===== PROJECTS ===== -->
    <section id="projects" class="py-20 px-4 sm:px-6 lg:px-8 bg-gray-50 dark:bg-gray-800/50">
        <div class="max-w-7xl mx-auto">
            <h2 class="text-4xl font-bold mb-12 flex items-center gap-3" data-aos="fade-right">
                <span class="text-jb-pink" aria-hidden="true">//</span>
                <span x-text="t('projects.title')"></span>
            </h2>

            <!-- loading skeletons -->
            <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-6" x-show="loading" aria-busy="true">
                <template x-for="i in 3" :key="i">
                    <div class="liquid-glass rounded-2xl p-6 skeleton h-64" role="status" aria-label="Loading"></div>
                </template>
            </div>

            <!-- live repos -->
            <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-6" x-show="!loading && repos.length > 0">
                <template x-for="repo in repos" :key="repo.id">
                    <article class="liquid-glass rounded-2xl p-6 hover:border-accent/50 transition-all repo-card" data-aos="fade-up">
                        <div class="flex items-start justify-between mb-3">
                            <h3 class="text-xl font-bold text-jb-pink" x-text="repo.name"></h3>
                            <span class="material-symbols-outlined text-yellow-400 text-xl"
                                  x-show="repo.stargazers_count > 0"
                                  style="font-variation-settings:'FILL' 1,'wght' 400,'GRAD' 0,'opsz' 24;"
                                  aria-hidden="true">star</span>
                        </div>
                        <p class="text-gray-600 dark:text-gray-400 mb-4 line-clamp-3"
                           x-text="repo.description || t('projects.noDesc')"></p>

            async fetchGitHubData() {
                const ctrl = new AbortController();
                const tid  = setTimeout(() => ctrl.abort(), 5000);
                try {
                    const [reposRes, userRes] = await Promise.allSettled([
                        fetch('https://api.github.com/users/e-gleba/repos?sort=updated&per_page=6', {
                            headers: { Accept: 'application/vnd.github.v3+json' },
                            signal: ctrl.signal
                        }),
                        fetch('https://api.github.com/users/e-gleba', {
                            headers: { Accept: 'application/vnd.github.v3+json' },
                            signal: ctrl.signal
                        })
                    ]);
                    clearTimeout(tid);

                    if (reposRes.status === 'fulfilled' && reposRes.value.ok) {
                        const data = await reposRes.value.json();
                        this.repos = Array.isArray(data) ? data : [];
                    }
                    if (userRes.status === 'fulfilled' && userRes.value.ok) {
                        this.stats = await userRes.value.json();
                    }
                } catch (e) {
                    console.warn('github api unavailable:', e.message);
                    this.repos = [];
                    this.stats = { public_repos: 0 };
                } finally {
                    clearTimeout(tid);
                    this.loading = false;
                }
            },

            init() {
                this.fetchGitHubData();

                window.addEventListener('scroll', () => {
                    this.showTop = window.scrollY > 500;
                }, { passive: true });

                document.addEventListener('DOMContentLoaded', () => {
                    if (typeof AOS !== 'undefined') {
                        AOS.init({ duration: 600, once: true, offset: 80, disable: 'mobile' });
                    }
                });

                // smooth-scroll for anchor links
                document.addEventListener('click', (e) => {
                    const a = e.target.closest('a[href^="#"]');
                    if (!a) return;
                    e.preventDefault();
                    const el = document.querySelector(a.getAttribute('href'));
                    el?.scrollIntoView({ behavior: 'smooth', block: 'start' });
                });
            }
        };
    }
    </script>
</body>
</html>
